<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Amam</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/assets/dashboard.css">
    <link rel="stylesheet" href="/assets/common.css">
    <script src="/assets/common.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">🎓</div>
            <div class="user-info">
                <h2 id="welcomeStudent">Welcome, Student!</h2>
                <p id="studentEmail">student@university.edu</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('bookRide')">📍 Book Ride</button>
            <button class="nav-tab" onclick="switchTab('myRides')">🚗 My Rides</button>
            <button class="nav-tab" onclick="switchTab('profile')">👤 Profile</button>
        </div>

        <!-- Book Ride Tab -->
        <div id="bookRide" class="tab-content active">
            <div class="panel">
                <h2 class="panel-title">📍 Book a Ride</h2>
                <form id="rideBookingForm" class="form">
                    <div class="form-group">
                        <label for="pickup">Pickup Location</label>
                        <input type="text" id="pickup" name="pickup" required placeholder="Enter pickup location">
                    </div>
                    <div class="form-group">
                        <label for="destination">Destination</label>
                        <input type="text" id="destination" name="destination" required placeholder="Enter destination">
                    </div>
                    <div class="form-group">
                        <label for="passengers">Number of Passengers</label>
                        <select id="passengers" name="passengers">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">🚗 Book Ride</button>
                </form>
            </div>
        </div>

        <!-- My Rides Tab -->
        <div id="myRides" class="tab-content">
            <div class="panel">
                <h2 class="panel-title">🚗 My Rides</h2>
                <div id="ridesList" class="rides-list">
                    <div class="no-rides">
                        <div class="no-rides-icon">🚗</div>
                        <h3>No Rides Yet</h3>
                        <p>Book your first ride to get started!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Tab -->
        <div id="profile" class="tab-content">
            <div class="panel">
                <h2 class="panel-title">👤 Profile</h2>
                <div class="profile-info">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="profileName" readonly>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="profileEmail" readonly>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="profilePhone" readonly>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div data-include="/assets/common-modal.html"></div>

    <script>
        // Load user data and initialize
        let userData = null;
        window.onload = function() {
            const userDataStr = sessionStorage.getItem('userData');
            if (!userDataStr) {
                window.location.href = 'login.html';
                return;
            }
            userData = JSON.parse(userDataStr);

            // Update header info
            document.getElementById('welcomeStudent').textContent = `Welcome, ${userData.name || 'Student'}!`;
            document.getElementById('studentEmail').textContent = userData.email;

            // Load profile data
            loadProfile();
            loadMyRides();
        };

        // Load profile information
        async function loadProfile() {
            try {
                const response = await fetch('/api/users/me', {
                    headers: {
                        'Authorization': `Bearer ${sessionStorage.getItem('authToken')}`
                    }
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('profileUsername').value = data.username;
                    document.getElementById('profileEmail').value = data.email;
                    document.getElementById('profilePhone').value = data.phone || '';
                    document.getElementById('profileMajor').value = data.major || '';
                }
            } catch (error) {
                console.error('Profile load error:', error);
            }
        }

        // Load user's rides
        async function loadMyRides() {
            try {
                const response = await fetch('/api/rides/my-rides', {
                    headers: {
                        'Authorization': `Bearer ${sessionStorage.getItem('authToken')}`
                    }
                });
                const data = await response.json();
                if (data.success) {
                    displayRides(data.rides);
                }
            } catch (error) {
                console.error('Rides load error:', error);
            }
        }

        // Display rides in the list
        function displayRides(rides) {
            const ridesList = document.getElementById('ridesList');
            if (rides.length === 0) {
                ridesList.innerHTML = `
                    <div class="no-rides">
                        <div class="no-rides-icon">🚗</div>
                        <h3>No Rides Yet</h3>
                        <p>Book your first ride to get started!</p>
                    </div>
                `;
                return;
            }

            ridesList.innerHTML = rides.map(ride => `
                <div class="ride-card">
                    <div class="ride-header">
                        <span class="ride-date">${new Date(ride.created_at).toLocaleDateString()}</span>
                        <span class="ride-status status-${ride.status}">${ride.status}</span>
                    </div>
                    <div class="ride-details">
                        <div class="ride-route">
                            <span class="pickup">📍 ${ride.pickup}</span>
                            <span class="arrow">→</span>
                            <span class="destination">🏁 ${ride.destination}</span>
                        </div>
                        <div class="ride-info">
                            <span>👥 ${ride.passengers} passengers</span>
                            <span>💰 $${ride.fare}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Handle ride booking form submission
        document.getElementById('rideBookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const rideData = {
                pickup: formData.get('pickup'),
                destination: formData.get('destination'),
                passengers: parseInt(formData.get('passengers'))
            };

            try {
                const response = await fetch('/api/rides', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sessionStorage.getItem('authToken')}`
                    },
                    body: JSON.stringify(rideData)
                });

                const data = await response.json();
                if (data.success) {
                    showNotification('Ride booked successfully!', 'success');
                    this.reset();
                    loadMyRides(); // Refresh rides list
                } else {
                    showNotification(data.message || 'Failed to book ride', 'error');
                }
            } catch (error) {
                console.error('Booking error:', error);
                showNotification('Network error. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
