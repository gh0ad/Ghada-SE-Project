    <script>
        const accountType = document.getElementById('accountType');
        const driverFields = document.getElementById('driverFields');
        const signupForm = document.getElementById('signupForm');

        // Show/hide driver fields
        accountType.addEventListener('change', function() {
            if (this.value === 'driver') {
                driverFields.style.display = 'block';
                // Make driver fields required
                document.getElementById('licenseNumber').required = true;
                document.getElementById('vehicleMake').required = true;
                document.getElementById('plateNumber').required = true;
            } else {
                driverFields.style.display = 'none';
                // Remove required from driver fields
                document.getElementById('licenseNumber').required = false;
                document.getElementById('vehicleMake').required = false;
                document.getElementById('plateNumber').required = false;
            }
        });

        // Form submission
        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate university email
            if (!email.endsWith('sm.imamu.edu.sa')) {
                alert('Please use your university email address (sm.imamu.edu.sa)');
                return;
            }

            // Validate password match
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            // Collect form data
            const formData = {
                username: document.getElementById('username').value,
                email: email,
                password: password,
                studentId: email.split("@")[0], // Auto-generate student ID
                university: 'Imam Mohammed Ibn Saud Islamic University',
                major: 'Not Specified',
                phone: document.getElementById('fullName').value // Using fullName field as phone for now
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    // Send verification email via Supabase Auth
                    const emailResponse = await fetch('/api/send-verification-email', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ 
                            email: email,
                            password: password 
                        })
                    });

                    const emailData = await emailResponse.json();

                    if (emailResponse.ok) {
                        alert('🎉 Account created! Please check your email to verify your account.');
                        window.location.href = 'login.html';
                    } else {
                        alert('✅ Account created! Check your email for verification link (check spam folder too).');
                        window.location.href = 'login.html';
                    }
                } else {
                    alert(data.error || 'Registration failed. Please try again.');
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Network error. Please try again.');
            }
        });
    </script>
